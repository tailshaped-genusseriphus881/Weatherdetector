<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySense – Live Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffbe00;
    --neon-green: #39ff14;
    --neon-purple: #bf5af2;
    --bg-dark: #050814;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: #fff; min-height: 100vh; overflow-x: hidden; position: relative; }
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,245,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,0,110,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(191,90,242,0.1) 0%, transparent 70%),
      #050814;
    animation: meshShift 12s ease-in-out infinite alternate;
  }
  @keyframes meshShift {
    0% { background-position: 0% 0%, 100% 100%, 50% 50%; }
    100% { background-position: 10% 5%, 90% 95%, 60% 40%; }
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .logo {
    font-family: 'Bebas Neue', cursive; font-size: 3rem; letter-spacing: 4px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,245,255,0.5));
  }
  .logo span { background: linear-gradient(135deg, var(--neon-pink), var(--neon-yellow)); -webkit-background-clip: text; background-clip: text; }
  .tagline { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .detect-btn {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    border: none; border-radius: 50px; padding: 14px 28px; color: #000;
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 1px;
    cursor: pointer; transition: all 0.3s ease;
    box-shadow: 0 0 30px rgba(0,245,255,0.4), 0 0 60px rgba(0,245,255,0.1);
    position: relative; overflow: hidden;
  }
  .detect-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--neon-pink), var(--neon-yellow)); opacity: 0; transition: opacity 0.3s; }
  .detect-btn:hover::before { opacity: 1; }
  .detect-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,0,110,0.5); }
  .detect-btn span { position: relative; z-index: 1; }
  .detect-btn .icon { font-size: 1.2rem; position: relative; z-index: 1; }
  .detect-btn.loading .icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 18px; }
  .search-box {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 6px 6px 6px 20px;
    backdrop-filter: blur(20px); transition: border-color 0.3s, box-shadow 0.3s; gap: 12px;
  }
  .search-box:focus-within { border-color: var(--neon-cyan); box-shadow: 0 0 0 1px var(--neon-cyan), 0 0 30px rgba(0,245,255,0.15); }
  .search-icon { font-size: 1.2rem; flex-shrink: 0; opacity: 0.6; }
  .search-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Outfit', sans-serif; font-size: 1rem; letter-spacing: 0.5px; padding: 10px 0; }
  .search-input::placeholder { color: rgba(255,255,255,0.3); }
  .search-btn {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    border: none; border-radius: 14px; padding: 12px 28px; color: #000;
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; transition: all 0.3s ease; white-space: nowrap; position: relative; overflow: hidden;
  }
  .search-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--neon-pink), var(--neon-yellow)); opacity: 0; transition: opacity 0.3s; }
  .search-btn:hover::before { opacity: 1; }
  .search-btn span { position: relative; z-index: 1; }
  .suggestions-box {
    position: absolute; top: calc(100% + 10px); left: 0; right: 0;
    background: rgba(10,12,30,0.97); border: 1px solid rgba(0,245,255,0.2);
    border-radius: 16px; overflow: hidden; z-index: 100;
    backdrop-filter: blur(20px); display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(0,245,255,0.05);
  }
  .suggestions-box.visible { display: block; }
  .suggestion-item { padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.95rem; }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: rgba(0,245,255,0.08); }
  .suggestion-item .s-flag { font-size: 1.4rem; }
  .suggestion-item .s-city { font-weight: 600; }
  .suggestion-item .s-country { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-left: 4px; }

  /* QUICK CHIPS */
  .popular-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; align-items: center; }
  .popular-label { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); flex-shrink: 0; }
  .pop-chip {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 6px 16px; font-size: 0.8rem;
    cursor: pointer; transition: all 0.25s; color: rgba(255,255,255,0.6);
  }
  .pop-chip:hover { background: rgba(0,245,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,245,255,0.2); transform: translateY(-2px); }

  /* MAIN CARD */
  .main-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 30px; padding: 50px; backdrop-filter: blur(20px);
    position: relative; overflow: hidden; margin-bottom: 30px;
    animation: fadeUp 0.6s ease forwards; opacity: 0; transform: translateY(30px);
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .main-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-yellow), var(--neon-green));
    background-size: 300% 100%; animation: gradientSlide 3s linear infinite;
  }
  @keyframes gradientSlide { 0% { background-position: 0% 0%; } 100% { background-position: 300% 0%; } }
  .main-card::after {
    content: ''; position: absolute; bottom: -100px; right: -100px;
    width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,245,255,0.08) 0%, transparent 70%);
  }
  .location-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .location-pin { font-size: 1.5rem; filter: drop-shadow(0 0 8px var(--neon-pink)); }
  .city-name { font-family: 'Bebas Neue', cursive; font-size: 3.5rem; letter-spacing: 3px; background: linear-gradient(90deg, #fff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .country { font-size: 1rem; color: var(--neon-cyan); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-cyan); }
  .datetime { font-size: 0.85rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 40px; }
  .temp-section { display: flex; align-items: flex-end; gap: 30px; flex-wrap: wrap; }
  .temp-display { display: flex; align-items: flex-start; }
  .temp-number { font-family: 'Bebas Neue', cursive; font-size: 9rem; line-height: 1; background: linear-gradient(135deg, #fff 30%, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(0,245,255,0.3)); }
  .temp-unit { font-family: 'Bebas Neue', cursive; font-size: 3rem; color: var(--neon-cyan); margin-top: 15px; text-shadow: 0 0 15px var(--neon-cyan); }
  .weather-desc-section { flex: 1; }
  .weather-emoji { font-size: 5rem; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(255,190,0,0.5)); animation: floatEmoji 3s ease-in-out infinite; }
  @keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .weather-description { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 2px; background: linear-gradient(135deg, var(--neon-yellow), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .feels-like { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 5px; }
  .aqi-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(57,255,20,0.1); border: 1px solid rgba(57,255,20,0.3); border-radius: 50px; padding: 6px 16px; font-size: 0.75rem; color: var(--neon-green); letter-spacing: 1px; text-transform: uppercase; margin-top: 15px; }
  .aqi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
  .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; text-align: center; transition: all 0.3s ease; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; border-radius: 20px; }
  .stat-card:nth-child(1)::before { background: linear-gradient(135deg, rgba(0,245,255,0.1), transparent); }
  .stat-card:nth-child(2)::before { background: linear-gradient(135deg, rgba(255,0,110,0.1), transparent); }
  .stat-card:nth-child(3)::before { background: linear-gradient(135deg, rgba(255,190,0,0.1), transparent); }
  .stat-card:nth-child(4)::before { background: linear-gradient(135deg, rgba(57,255,20,0.1), transparent); }
  .stat-card:hover::before { opacity: 1; }
  .stat-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
  .stat-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .stat-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; }
  .stat-card:nth-child(1) .stat-value { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
  .stat-card:nth-child(2) .stat-value { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
  .stat-card:nth-child(3) .stat-value { color: var(--neon-yellow); text-shadow: 0 0 15px var(--neon-yellow); }
  .stat-card:nth-child(4) .stat-value { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
  .sun-bar-wrap { margin-top: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 20px 25px; }
  .sun-bar-title { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 12px; }
  .sun-bar { position: relative; height: 6px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: visible; }
  .sun-progress { height: 100%; background: linear-gradient(90deg, var(--neon-yellow), var(--neon-pink)); border-radius: 10px; box-shadow: 0 0 15px rgba(255,190,0,0.5); transition: width 1s ease; }
  .sun-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; background: var(--neon-yellow); box-shadow: 0 0 20px var(--neon-yellow); }
  .sun-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.78rem; color: rgba(255,255,255,0.4); }
  .update-time { font-size: 0.75rem; color: rgba(255,255,255,0.3); text-align: right; margin-top: 10px; letter-spacing: 1px; }
  .section-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 4px; color: rgba(255,255,255,0.6); margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.2), transparent); }
  .nearby-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .nearby-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 25px; backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; animation: fadeUp 0.6s ease forwards; opacity: 0; transform: translateY(20px); }
  .nearby-card:nth-child(1) { animation-delay: 0.1s; }
  .nearby-card:nth-child(2) { animation-delay: 0.2s; }
  .nearby-card:nth-child(3) { animation-delay: 0.3s; }
  .nearby-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--neon-cyan); box-shadow: 0 20px 60px rgba(0,245,255,0.1), 0 0 0 1px rgba(0,245,255,0.2); }
  .nearby-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); opacity: 0; transition: opacity 0.3s; }
  .nearby-card:hover::before { opacity: 1; }
  .nearby-city { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .nearby-region { font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; }
  .nearby-temp-row { display: flex; align-items: center; justify-content: space-between; }
  .nearby-emoji { font-size: 2.5rem; }
  .nearby-temp { font-family: 'Bebas Neue', cursive; font-size: 2.8rem; background: linear-gradient(135deg, #fff, rgba(255,255,255,0.6)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .nearby-meta { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.06); }
  .nearby-meta-item { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
  .nearby-meta-item strong { color: rgba(255,255,255,0.8); font-weight: 500; }
  .placeholder { text-align: center; padding: 80px 20px; animation: fadeUp 0.6s ease forwards; }
  .placeholder-icon { font-size: 6rem; display: block; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
  .placeholder h2 { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 3px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
  .placeholder p { color: rgba(255,255,255,0.4); font-size: 1rem; max-width: 440px; margin: 0 auto; }
  .error-msg { background: rgba(255,0,110,0.1); border: 1px solid rgba(255,0,110,0.3); border-radius: 15px; padding: 20px 25px; color: var(--neon-pink); font-size: 0.9rem; text-align: center; margin-top: 20px; animation: fadeUp 0.4s ease forwards; }
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .nearby-grid { grid-template-columns: 1fr; }
    .temp-number { font-size: 6rem; }
    .main-card { padding: 30px 20px; }
    header { flex-direction: column; gap: 20px; text-align: center; }
    .search-btn { padding: 12px 16px; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="container">
  <header>
    <div>
      <div class="logo">Sky<span>Sense</span></div>
      <div class="tagline">Live Weather Intelligence</div>
    </div>
    <button class="detect-btn" onclick="detectLocation()">
      <span class="icon">🎯</span>
      <span>Detect My Location</span>
    </button>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search any city worldwide... e.g. Colombo, Sri Lanka or Tokyo"
        onkeydown="if(event.key==='Enter') searchCity()"
        oninput="handleInput(this.value)"
        autocomplete="off"
      />
      <button class="search-btn" onclick="searchCity()"><span>Search</span></button>
    </div>
    <div class="suggestions-box" id="suggestionsBox"></div>
  </div>

  <div class="popular-row">
    <span class="popular-label">Quick →</span>
    <span class="pop-chip" onclick="quickSearch('Colombo')">🇱🇰 Colombo</span>
    <span class="pop-chip" onclick="quickSearch('Mumbai')">🇮🇳 Mumbai</span>
    <span class="pop-chip" onclick="quickSearch('Chennai')">🇮🇳 Chennai</span>
    <span class="pop-chip" onclick="quickSearch('Tokyo')">🇯🇵 Tokyo</span>
    <span class="pop-chip" onclick="quickSearch('Dubai')">🇦🇪 Dubai</span>
    <span class="pop-chip" onclick="quickSearch('London')">🇬🇧 London</span>
    <span class="pop-chip" onclick="quickSearch('Singapore')">🇸🇬 Singapore</span>
  </div>

  <div id="app-content">
    <div class="placeholder">
      <span class="placeholder-icon">🌍</span>
      <h2>Weather At Your Fingertips</h2>
      <p>Search any city worldwide, tap a quick chip above, or detect your current location</p>
    </div>
  </div>
</div>

<script>
  const API_KEY = '6f231d5ede1c7d92a1ed02984e234436';
  let suggestionTimeout = null;

  const weatherMap = {
    'Clear':        { emoji: '☀️',  label: 'Clear Sky' },
    'Clouds':       { emoji: '⛅',  label: 'Cloudy' },
    'Rain':         { emoji: '🌧️', label: 'Rainy' },
    'Drizzle':      { emoji: '🌦️', label: 'Drizzle' },
    'Thunderstorm': { emoji: '⛈️', label: 'Thunderstorm' },
    'Snow':         { emoji: '❄️',  label: 'Snowy' },
    'Mist':         { emoji: '🌫️', label: 'Misty' },
    'Fog':          { emoji: '🌁',  label: 'Foggy' },
    'Haze':         { emoji: '🌫️', label: 'Hazy' },
    'Dust':         { emoji: '💨',  label: 'Dusty' },
  };

  const countryFlags = {
    'LK':'🇱🇰','IN':'🇮🇳','JP':'🇯🇵','US':'🇺🇸','GB':'🇬🇧','AU':'🇦🇺',
    'DE':'🇩🇪','FR':'🇫🇷','SG':'🇸🇬','AE':'🇦🇪','CN':'🇨🇳','BR':'🇧🇷',
    'CA':'🇨🇦','IT':'🇮🇹','ES':'🇪🇸','MX':'🇲🇽','KR':'🇰🇷','TH':'🇹🇭',
    'PK':'🇵🇰','BD':'🇧🇩','NP':'🇳🇵','MV':'🇲🇻','MY':'🇲🇾','ID':'🇮🇩',
    'VN':'🇻🇳','PH':'🇵🇭','NZ':'🇳🇿','ZA':'🇿🇦','NG':'🇳🇬','EG':'🇪🇬',
  };

  function getWeatherIcon(main) { return weatherMap[main] || { emoji: '🌤️', label: main }; }
  function getFlag(code) { return countryFlags[code] || '🌐'; }

  function formatTime(timestamp, offset) {
    const d = new Date((timestamp + offset) * 1000);
    return d.toUTCString().slice(17, 22);
  }

  function getSunProgress(sunrise, sunset) {
    const now = Date.now() / 1000;
    if (now < sunrise) return 0;
    if (now > sunset) return 100;
    return ((now - sunrise) / (sunset - sunrise)) * 100;
  }

  function windDir(deg) {
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg / 45) % 8];
  }

  function handleInput(val) {
    clearTimeout(suggestionTimeout);
    if (val.trim().length < 2) { hideSuggestions(); return; }
    suggestionTimeout = setTimeout(() => fetchSuggestions(val.trim()), 400);
  }

  async function fetchSuggestions(query) {
    try {
      const res = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=6&appid=${API_KEY}`);
      const data = await res.json();
      renderSuggestions(data);
    } catch (e) { hideSuggestions(); }
  }

  function renderSuggestions(items) {
    const box = document.getElementById('suggestionsBox');
    if (!items || items.length === 0) { hideSuggestions(); return; }
    box.innerHTML = items.map(item => `
      <div class="suggestion-item" onclick="loadWeatherByCoords(${item.lat}, ${item.lon}, '${item.name.replace(/'/g,"\\'")}')">
        <span class="s-flag">${getFlag(item.country)}</span>
        <span>
          <span class="s-city">${item.name}</span>
          <span class="s-country">${item.state ? item.state + ', ' : ''}${item.country}</span>
        </span>
      </div>
    `).join('');
    box.classList.add('visible');
  }

  function hideSuggestions() {
    const box = document.getElementById('suggestionsBox');
    box.classList.remove('visible');
    box.innerHTML = '';
  }

  async function searchCity() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    hideSuggestions();
    try {
      const res = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=1&appid=${API_KEY}`);
      const data = await res.json();
      if (!data || data.length === 0) { showError(`City "${query}" not found. Try a different name.`); return; }
      await loadWeather(data[0].lat, data[0].lon);
    } catch (e) { showError("Network error. Check your connection and try again."); }
  }

  function quickSearch(city) {
    document.getElementById('searchInput').value = city;
    searchCity();
  }

  function loadWeatherByCoords(lat, lon, name) {
    hideSuggestions();
    document.getElementById('searchInput').value = name;
    loadWeather(lat, lon);
  }

  async function detectLocation() {
    const btn = document.querySelector('.detect-btn');
    btn.classList.add('loading');
    btn.querySelector('span:last-child').textContent = 'Detecting...';
    if (!navigator.geolocation) {
      showError("Geolocation not supported by your browser.");
      btn.classList.remove('loading');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        await loadWeather(pos.coords.latitude, pos.coords.longitude);
        btn.classList.remove('loading');
        btn.querySelector('span:last-child').textContent = 'Refresh';
      },
      (err) => {
        btn.classList.remove('loading');
        btn.querySelector('span:last-child').textContent = 'Detect My Location';
        if (err.code === 1) showError("Location permission denied. Please allow access and try again.");
        else showError("Unable to retrieve location. Try again.");
      },
      { timeout: 10000 }
    );
  }

  async function loadWeather(lat, lon) {
    try {
      const [mainRes, nearbyRes] = await Promise.all([
        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`),
        fetch(`https://api.openweathermap.org/data/2.5/find?lat=${lat}&lon=${lon}&cnt=6&appid=${API_KEY}&units=metric`)
      ]);
      const mainData = await mainRes.json();
      const nearbyData = await nearbyRes.json();
      if (mainData.cod !== 200) { showError(`Weather data error: ${mainData.message}`); return; }
      renderMain(mainData);
      renderNearby(nearbyData.list ? nearbyData.list.filter(c => c.id !== mainData.id).slice(0, 3) : []);
    } catch (e) { showError("Network error. Check your connection and try again."); }
  }

  function renderMain(d) {
    const icon = getWeatherIcon(d.weather[0].main);
    const sunProg = getSunProgress(d.sys.sunrise, d.sys.sunset);
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const flag = getFlag(d.sys.country);
    document.getElementById('app-content').innerHTML = `
      <div class="main-card">
        <div class="location-row">
          <span class="location-pin">📍</span>
          <div class="city-name">${d.name}</div>
        </div>
        <div class="country">${flag} ${d.sys.country}</div>
        <div class="datetime">${dateStr} &nbsp;•&nbsp; ${timeStr}</div>
        <div class="temp-section">
          <div class="temp-display">
            <div class="temp-number">${Math.round(d.main.temp)}</div>
            <div class="temp-unit">°C</div>
          </div>
          <div class="weather-desc-section">
            <span class="weather-emoji">${icon.emoji}</span>
            <div class="weather-description">${icon.label}</div>
            <div class="feels-like">Feels like ${Math.round(d.main.feels_like)}°C &nbsp;|&nbsp; Min ${Math.round(d.main.temp_min)}° / Max ${Math.round(d.main.temp_max)}°</div>
            <div class="aqi-badge"><div class="aqi-dot"></div> Live Data</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><span class="stat-icon">💧</span><div class="stat-label">Humidity</div><div class="stat-value">${d.main.humidity}%</div></div>
          <div class="stat-card"><span class="stat-icon">💨</span><div class="stat-label">Wind</div><div class="stat-value">${Math.round(d.wind.speed * 3.6)} km/h ${windDir(d.wind.deg || 0)}</div></div>
          <div class="stat-card"><span class="stat-icon">🔽</span><div class="stat-label">Pressure</div><div class="stat-value">${d.main.pressure} hPa</div></div>
          <div class="stat-card"><span class="stat-icon">👁️</span><div class="stat-label">Visibility</div><div class="stat-value">${(d.visibility / 1000).toFixed(1)} km</div></div>
        </div>
        <div class="sun-bar-wrap">
          <div class="sun-bar-title">☀️ Sunrise &amp; Sunset</div>
          <div class="sun-bar">
            <div class="sun-progress" style="width:${sunProg}%"></div>
            <div class="sun-dot" style="left:${sunProg}%"></div>
          </div>
          <div class="sun-labels">
            <span>🌅 ${formatTime(d.sys.sunrise, d.timezone)}</span>
            <span>🌇 ${formatTime(d.sys.sunset, d.timezone)}</span>
          </div>
        </div>
        <div class="update-time">Updated: ${timeStr}</div>
      </div>
    `;
  }

  function renderNearby(cities) {
    if (!cities.length) return;
    let html = `<div class="section-title">Nearby Areas</div><div class="nearby-grid">`;
    cities.forEach(c => {
      const icon = getWeatherIcon(c.weather[0].main);
      const flag = getFlag(c.sys.country);
      html += `
        <div class="nearby-card" onclick="loadWeather(${c.coord.lat}, ${c.coord.lon})">
          <div class="nearby-city">${flag} ${c.name}</div>
          <div class="nearby-region">${c.sys.country} • ${Math.abs(Math.round(c.coord.lat))}°${c.coord.lat >= 0 ? 'N' : 'S'}</div>
          <div class="nearby-temp-row">
            <span class="nearby-emoji">${icon.emoji}</span>
            <div class="nearby-temp">${Math.round(c.main.temp)}°</div>
          </div>
          <div class="nearby-meta">
            <div class="nearby-meta-item">💧 <strong>${c.main.humidity}%</strong></div>
            <div class="nearby-meta-item">💨 <strong>${Math.round(c.wind.speed * 3.6)} km/h</strong></div>
            <div class="nearby-meta-item">${icon.label}</div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
    document.getElementById('app-content').innerHTML += html;
  }

  function showError(msg) {
    const existing = document.querySelector('.error-msg');
    if (existing) existing.remove();
    const err = document.createElement('div');
    err.className = 'error-msg';
    err.innerHTML = `⚠️ ${msg}`;
    document.getElementById('app-content').appendChild(err);
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) hideSuggestions();
  });
</script>
</body>
</html>
